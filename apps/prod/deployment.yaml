apiVersion: apps/v1
kind: Deployment

metadata:
  name: nginx-dev
  namespace: dev

spec:
  replicas: 1

  selector:
    matchLabels:
      app: nginx-dev

  template:
    metadata:
      labels:
        app: nginx-dev

    spec:
      containers:
        - name: nginx

          image: nginx:latest

          command:
            - /bin/sh
            - -c

          args:
            - |
              cat <<EOF >/etc/nginx/conf.d/default.conf
              server {
                listen 81;
                location / {
                  root /usr/share/nginx/html;
                  index index.html;
                }
              }
              EOF
              nginx -g 'daemon off;'

          ports:
            - containerPort: 81
