apiVersion: apps/v1
kind: Deployment

metadata:
  name: nginx-prod
  namespace: prod

spec:
  replicas: 1

  selector:
    matchLabels:
      app: nginx-prod

  template:
    metadata:
      labels:
        app: nginx-prod

    spec:
      containers:
        - name: nginx

          image: nginx:latest

          ports:
            - containerPort: 80
