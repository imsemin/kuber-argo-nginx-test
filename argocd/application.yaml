apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: nginx-environments
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://github.com/imsemin/kuber-argo-nginx-test.git
    targetRevision: main
    path: apps

  destination:
    server: https://kubernetes.default.svc
    namespace: default

  syncPolicy:
    automated:
      prune: true
      selfHeal: true

    syncOptions:
      - CreateNamespace=true
